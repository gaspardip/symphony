server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: symphony-log-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: symphony
          app: symphony
          __path__: /var/log/symphony/*.log
