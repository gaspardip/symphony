name: copilot-housekeeping

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - ".github/copilot-instructions.md"
      - ".github/instructions/**"
      - ".github/workflows/**"
      - ".symphony/harness.yml"
      - "scripts/symphony-validate.sh"
      - "elixir/Makefile"
      - "elixir/lib/symphony_elixir/**"
      - "elixir/lib/symphony_elixir_web/**"

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: copilot-housekeeping
  cancel-in-progress: false

jobs:
  open-or-update-housekeeping-issue:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Open or update housekeeping issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Copilot review housekeeping";
            const labelName = "copilot-housekeeping";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const instructionFiles = [
              ".github/copilot-instructions.md",
              ".github/instructions/runtime-delivery.instructions.md",
              ".github/instructions/observability-ui.instructions.md",
            ];
            const riskPaths = [
              "elixir/lib/symphony_elixir/**",
              "elixir/lib/symphony_elixir_web/**",
              ".symphony/harness.yml",
              "scripts/symphony-validate.sh",
              "elixir/Makefile",
              ".github/copilot-instructions.md",
              ".github/instructions/**",
            ];

            async function ensureLabel() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch (error) {
                if (error.status !== 404) throw error;

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: "5319e7",
                  description: "Recurring review-instruction housekeeping",
                });
              }
            }

            async function findOpenIssue() {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: "open",
                labels: labelName,
                per_page: 100,
              });

              return issues.find((issue) => issue.title === title);
            }

            async function createIssue() {
              const body = [
                "Keep GitHub Copilot review instructions lean and repo-grounded.",
                "",
                "Use this issue to decide only whether the current instruction set should change.",
                "",
                "Checklist:",
                "- Which repeated human review comments should become one narrow instruction?",
                "- Which current instructions are noisy, stale, or scoped too broadly?",
                "- Which escaped bugs or regressions suggest a missing invariant?",
                "- Which existing tests or repo contracts should a new rule point reviewers toward?",
                "",
                "Current instruction files:",
                ...instructionFiles.map((file) => `- \`${file}\``),
                "",
                "High-risk paths to sample from recent merges:",
                ...riskPaths.map((path) => `- \`${path}\``),
                "",
                "Prefer deletions and narrower `applyTo` scopes over adding new rules.",
              ].join("\n");

              const response = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [labelName],
              });

              return response.data;
            }

            async function recentMergedPulls() {
              const response = await github.rest.pulls.list({
                owner,
                repo,
                state: "closed",
                sort: "updated",
                direction: "desc",
                per_page: 10,
              });

              return response.data.filter((pr) => pr.merged_at).slice(0, 5);
            }

            function truncate(text, max = 160) {
              if (!text) return "";
              return text.length <= max ? text : `${text.slice(0, max - 1)}…`;
            }

            async function mergedPullRequestSection() {
              if (context.eventName !== "pull_request") {
                return null;
              }

              const pr = context.payload.pull_request;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });

              const changedFiles = files.slice(0, 15).map((file) => `- \`${file.filename}\``);

              return [
                `Merged PR: #${pr.number} ${pr.title}`,
                `URL: ${pr.html_url}`,
                "Changed files:",
                ...(changedFiles.length > 0 ? changedFiles : ["- none reported"]),
              ].join("\n");
            }

            await ensureLabel();

            let issue = await findOpenIssue();
            if (!issue) {
              issue = await createIssue();
            }

            const recentPulls = await recentMergedPulls();
            const mergedSection = await mergedPullRequestSection();
            const triggerSummary =
              context.eventName === "workflow_dispatch"
                ? "Manual run"
                : context.eventName === "schedule"
                  ? "Scheduled backstop"
                  : "Merged PR";

            const comment = [
              `Housekeeping trigger: ${triggerSummary}`,
              `Workflow run: ${runUrl}`,
              `Run date: ${new Date().toISOString()}`,
              "",
              ...(mergedSection ? [mergedSection, ""] : []),
              "Recent merged PRs to sample:",
              ...recentPulls.map((pr) => `- #${pr.number} ${truncate(pr.title)} (${pr.html_url})`),
              "",
              "Review prompts:",
              "- Did recent reviews repeat the same repo-specific comment enough to justify one narrow rule?",
              "- Did Copilot produce noisy comments that suggest a stale rule or overly broad scope?",
              "- Did any recent regression suggest a missing invariant around runtime stages, verifier isolation, required checks, or observability payloads?",
              "- If a rule changes, can it point to an existing contract file or focused regression suite instead of generic advice?",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: comment,
            });
