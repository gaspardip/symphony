version: 1
base_branch: main

project:
  type: elixir-app
agent_harness:
  scope: self_host_only
  initializer:
    enabled: true
    max_turns: 1
    refresh: missing
  knowledge:
    root: .symphony/knowledge
    required_files:
      - product.md
      - architecture.md
      - codebase-map.md
      - delivery-loop.md
      - testing-and-ops.md
  progress:
    root: .symphony/progress
    pattern: "{{ issue.identifier }}.md"
    required_sections:
      - Goal
      - Acceptance
      - Plan
      - Work Log
      - Evidence
      - Next Step
  features:
    root: .symphony/features
    format: yaml
    required_fields:
      - id
      - title
      - status
      - summary
      - source_paths
      - acceptance_signals
      - dependencies
      - last_updated_by_issue
  publish_gate:
    require_progress: true
    require_feature_update_on_code_change: false
preflight:
  description: Validate the local toolchain and repo bootstrap requirements for Symphony self-host runs.
  command:
    - ./scripts/symphony-preflight.sh
  outputs:
    format: text
  success:
    exit_code: 0
validation:
  description: Run the full deterministic self-host validation suite for Symphony.
  command:
    - ./scripts/symphony-validate.sh
  outputs:
    format: text
  success:
    exit_code: 0
smoke:
  description: Run the focused self-host smoke suite before publishing a PR.
  command:
    - ./scripts/symphony-smoke.sh
  outputs:
    format: text
  success:
    exit_code: 0
post_merge:
  description: Re-run the self-host smoke contract on the base branch after merge.
  command:
    - ./scripts/symphony-post-merge.sh
  outputs:
    format: text
  success:
    exit_code: 0
artifacts:
  description: Emit a JSON snapshot of the self-host harness and runtime contract.
  command:
    - ./scripts/symphony-artifacts.sh
  outputs:
    format: json
  success:
    exit_code: 0

verification:
  behavioral_proof:
    required: true
    mode: unit_first
    source_paths:
      - elixir/lib/
      - scripts/
      - ops/
      - .symphony/
      - AGENTS.md
    test_paths:
      - elixir/test/
      - scripts/
  ui_proof:
    required: false
    mode: local
    source_paths: []
    test_paths: []
    artifact_paths: []

ci:
  provider: github-actions
  workflow: .github/workflows/make-all.yml
  env: {}
  required_checks:
    - make-all

pull_request:
  required_checks:
    - make-all
    - pr-description-lint
