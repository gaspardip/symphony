id: runtime-core
title: Runtime Core
status: active
summary: Runtime-owned delivery stages, recovery, proof gates, publish lifecycle, persisted review-claim state, autonomous webhook-driven review verification, evidence-based review follow-up with non-actionable noise suppression, operator-visible lease and webhook assignment state, runner identity plus lease-backed channel-aware issue and webhook routing seams for stable ingress and isolated runner pools, a stable-ingress webhook relay bridge for healthy canary runners, repo-native runner promotion controls, token-aware resume context that narrows review-driven implement turns to the accepted PR claim scope, high-pressure prompt trimming that reduces accepted review batches to one claim and removes duplicated review context, conditional review-fix budget fallback that relaxes implement token caps only after repeated soft-pressure retries, a dedicated higher turn ceiling for high-pressure scoped review-fix implement runs, a bounded second-step review-fix budget bump to `85k/150k` after prior pressure is already recorded, live review-fix budget-stop persistence that writes retry evidence back into `run_state.json` and can recover retry-count signals from prior budget stops, fail-soft turn-result normalization for noisy blocker types instead of crashing the whole turn contract, seeded manual retry-state repair so blocked local replays resume the stored stage instead of redispatching a blocked run unchanged, and seeded manual redispatch fallback so resumed local replays stay dispatchable even when no manual-store issue record exists.
source_paths:
  - elixir/lib/symphony_elixir/delivery_engine.ex
  - elixir/lib/symphony_elixir/github_webhook_relay.ex
  - elixir/lib/symphony_elixir/orchestrator.ex
  - elixir/lib/symphony_elixir/run_state_store.ex
acceptance_signals:
  - Deterministic stage execution from checkout through post_merge
  - Auto-heal and block reasons are visible in operator payloads
  - Fully autonomous runs can resume from GitHub review feedback without a manual poll loop
  - Fully autonomous runs can pause in a passive review verification stage before reopening implementation
  - Review claims, verification state, and return-stage context persist across webhook-triggered follow-up
  - Review verification can enrich thread replies and resolution recommendations from collected evidence
  - Fully autonomous runs stay in place when webhook review feedback is triaged as non-actionable
  - Runtime topology supports stable webhook ingress with internal routing to isolated per-issue runners instead of live self-mutation
  - Persisted run state records runner identity and channel so review webhook follow-up can avoid cross-instance interference
  - Persisted run state records live lease ownership so same-channel runners do not both resume the same review follow-up
  - Dispatch, lease refresh, and lease release keep persisted run-state ownership aligned with the live lease file
  - Issue dispatch respects the target runner channel so stable and canary pools do not steal each other's work
  - High token-pressure review retries shrink to a single accepted claim and avoid duplicating review feedback in the implement prompt so PR-comment work can continue under the per-turn input budget
  - Repeated high-pressure review retries can relax the implement stage token budget modestly only after the first soft-budget retry has already been observed for accepted PR claims
  - High-pressure scoped review-fix implement runs can exceed the default implement turn cap without loosening the turn budget for normal implementation work
  - Focused review-fix prompts no longer repeat the same scoped claim block in resume context, keeping high-pressure retries narrower than normal implement turns
  - Budget-stop retries persist their blocked decision and retry-count evidence into the workspace state, so later canary retries do not restart from a blank high-pressure context
  - Malformed blocking `blocker_type` values are coerced into a generic implementation blocker instead of replacing an otherwise valid turn result with `implementation.invalid_turn_result`
  - Operator snapshots surface lease age, TTL, reclaimability, and latest GitHub assignment state so webhook and routing skips are explainable
  - Stable ingress can relay verified GitHub review webhooks to configured sibling runner instances without creating forwarding loops
  - Operators can invoke inspect, promote, record-canary, and rollback runner actions through the observability API using the repo-owned promotion script
  - Seeded manual run states with explicit policy metadata can synthesize a minimal issue shell and re-enter active review follow-up without a manual-store issue record
  - Seeded manual retries keep the locally resumed issue state when tracker/manual-store refresh is unavailable so `retry_now` can actually redispatch the stored workspace
  - Replay refresh drains GitHub inbox work even when runner metadata disables normal tracker dispatch
  - Seeded manual continuation retries can reuse the persisted issue envelope and workspace branch identity so local stable-ingress replays survive the `review_verification` to `implement` handoff
dependencies:
  - harness
last_updated_by_issue: CLZ-22
